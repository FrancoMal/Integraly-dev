services:
  # --- Base de datos PRODUCCION ---
  sqlserver-prod:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: aicoding-sqlserver-prod
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong@Passw0rd
      - MSSQL_PID=Express
    volumes:
      - sqlserver_prod_data:/var/opt/mssql
    networks:
      - aicoding-prod-net
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourStrong@Passw0rd" -C -Q "SELECT 1" || exit 1
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # --- Inicializacion de la DB PRODUCCION ---
  sqlserver-init-prod:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: aicoding-sqlserver-init-prod
    depends_on:
      sqlserver-prod:
        condition: service_healthy
    volumes:
      - ./db/init.sql:/init.sql
    networks:
      - aicoding-prod-net
    entrypoint: ["/opt/mssql-tools18/bin/sqlcmd", "-S", "sqlserver-prod", "-U", "sa", "-P", "YourStrong@Passw0rd", "-C", "-i", "/init.sql"]
    restart: "no"

  # --- Backend API PRODUCCION ---
  api-prod:
    build:
      context: ./src/Api
      dockerfile: Dockerfile
    container_name: aicoding-api-prod
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Server=sqlserver-prod;Database=AIcoding;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;
      - MP_ACCESS_TOKEN=${MP_ACCESS_TOKEN:-}
      - MP_PUBLIC_KEY=${MP_PUBLIC_KEY:-}
      - PAYPAL_CLIENT_ID=${PAYPAL_CLIENT_ID:-}
      - PAYPAL_CLIENT_SECRET=${PAYPAL_CLIENT_SECRET:-}
      - PAYPAL_MODE=${PAYPAL_MODE:-live}
      - TRANSFER_CVU=${TRANSFER_CVU:-}
      - TRANSFER_ALIAS=${TRANSFER_ALIAS:-}
      - TRANSFER_TITULAR=${TRANSFER_TITULAR:-}
      - APP_BASE_URL=https://integraly.dev
    volumes:
      - api-uploads-prod:/app/uploads
      - /proc:/host_proc:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - aicoding-prod-net
    depends_on:
      sqlserver-prod:
        condition: service_healthy
    restart: unless-stopped

  # --- Frontend PRODUCCION ---
  web-prod:
    build:
      context: ./src/Web
      dockerfile: Dockerfile
    container_name: aicoding-web-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - aicoding-prod-net
    depends_on:
      - api-prod
    restart: unless-stopped

networks:
  aicoding-prod-net:
    driver: bridge

volumes:
  sqlserver_prod_data:
  api-uploads-prod:
