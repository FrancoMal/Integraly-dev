server {
    listen 80;
    server_name localhost;

    # Default root for fallback
    root /usr/share/nginx/html;

    # Landing page at root
    location = / {
        try_files /index.html =404;
    }

    # Redirect /admin to /admin/
    absolute_redirect off;
    location = /admin {
        return 301 /admin/;
    }

    # Blazor WASM app under /admin/ (admin panel)
    location ^~ /admin/ {
        alias /usr/share/nginx/html/admin/;
        try_files $uri $uri/ /admin/index.html;
    }

    # Redirect /panel to /panel/
    location = /panel {
        return 301 /panel/;
    }

    # Blazor WASM app under /panel/ (user/instructor panel)
    location ^~ /panel/ {
        alias /usr/share/nginx/html/panel/;
        try_files $uri $uri/ /panel/index.html;
    }

    # API reverse proxy
    location /api/ {
        proxy_pass http://api:80/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Swagger proxy (development)
    location /swagger {
        proxy_pass http://api:80/swagger;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
