# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name integraly.dev www.integraly.dev;
    return 301 https://$host$request_uri;
}

# HTTPS Production (port 443)
server {
    listen 443 ssl;
    server_name integraly.dev www.integraly.dev;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/integraly.dev.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Default root for fallback
    root /usr/share/nginx/html;

    # Landing page at root
    location = / {
        try_files /index.html =404;
    }

    # Redirect /admin to /panel/ (legacy URL)
    absolute_redirect off;
    location = /admin {
        return 301 /panel/;
    }

    # Redirect /admin/* to /panel/* (legacy URLs)
    location ~ ^/admin/(.*)$ {
        return 301 /panel/$1;
    }

    # Redirect /panel to /panel/
    location = /panel {
        return 301 /panel/;
    }

    # Blazor WASM app under /panel/ (user/instructor panel)
    location ^~ /panel/ {
        alias /usr/share/nginx/html/panel/;
        try_files $uri $uri/ /panel/index.html;

        location ~* /_framework/ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
        location ~* \.(css|js)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
        location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|dll|wasm|dat)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # Webinar public form
    location = /webinar {
        return 301 /webinar/;
    }

    location ^~ /webinar/ {
        alias /usr/share/nginx/html/webinar/;
        try_files $uri $uri/ /webinar/index.html;

        location ~* /_framework/ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
        location ~* \.(css|js)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
        location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|dll|wasm|dat)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # API reverse proxy
    location /api/ {
        proxy_pass http://api-prod:80/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}
