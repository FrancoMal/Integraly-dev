server {
    listen 80;
    server_name localhost;

    # Default root for fallback
    root /usr/share/nginx/html;

    # Landing page at root
    location = / {
        try_files /index.html =404;
    }

    # Redirect /admin to /admin/
    location = /admin {
        return 301 /admin/;
    }

    # Blazor WASM app under /admin/ (^~ takes priority over regex locations)
    location ^~ /admin/ {
        alias /usr/share/nginx/html/admin/;
        try_files $uri $uri/ /admin/index.html;

        # Cache Blazor framework files aggressively
        location ~* /_framework/ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # Cache CSS/JS in production
        location ~* \.(css|js)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # Cache images, fonts, and Blazor binary assets
        location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|dll|wasm|dat)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # API reverse proxy
    location /api/ {
        proxy_pass http://api-prod:80/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
